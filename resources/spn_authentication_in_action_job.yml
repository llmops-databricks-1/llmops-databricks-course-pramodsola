resources:
  jobs:
    spn_authentication_in_action_job:
      name: 3-5-spn-authentication-in-action
      tags:
        project_name: "brickkit"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: run_notebook
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/3.5_spn_authentication_in_action.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
