resources:
  jobs:
    mlflow_log_register_job:
      name: 4-4-mlflow-log-register
      tags:
        project_name: "brickkit"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: run_notebook
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/4.4_mlflow_log_register.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
