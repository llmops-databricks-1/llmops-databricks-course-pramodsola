# Databricks Asset Bundle configuration for LLMOps Course
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation

bundle:
  name: course-code-hub

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED

include:
  - resources/*.yml

sync:
  include:
    - eval_inputs.txt
    - project_config.yml

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}

  acc:
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  prd:
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: UNPAUSED
